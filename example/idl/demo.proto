syntax = "proto3";
package demo;
option go_package = "github.com/byx-darwin/go-tools/example/kitex_generated/demo";

message EchoRequest {
  string message = 1;
}

message EchoResponse {
  string message = 1;
  string service = 2;
}

message HealthRequest {}

message HealthResponse {
  bool healthy = 1;
  string version = 2;
}

service DemoService {
  rpc Echo(EchoRequest) returns (EchoResponse);
  rpc Health(HealthRequest) returns (HealthResponse);
}

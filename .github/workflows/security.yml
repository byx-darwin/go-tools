name: Security

on:
  schedule:
    - cron: "0 0 * * 0"
  push:
    branches: [main]
    paths:
      - "**/go.mod"
      - "**/go.sum"
  pull_request:
    branches: [main]
    paths:
      - "**/go.mod"
      - "**/go.sum"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - go-common
          - go-auth
          - go-middleware
          - go-framework

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: scan
        run: govulncheck ./${{ matrix.module }}/...

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: github/codeql-action/init@v3
        with:
          languages: go

      - uses: github/codeql-action/analyze@v3

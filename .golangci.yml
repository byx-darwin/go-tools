version: "2"
run:
  modules-download-mode: readonly
linters:
  enable:
    - gocritic
    - misspell
    - revive
    - unconvert
    - unparam
  settings:
    gocritic:
      disabled-checks:
        - ifElseChain
        - unnamedResult
      enabled-tags:
        - diagnostic
        - style
    misspell:
      locale: US
    revive:
      rules:
        - name: exported
          arguments:
            - disableStutteringCheck
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 50
  max-same-issues: 10
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - gofmt
    - goimports
    - misspell
    - revive
    - unconvert
    - unparam
    - gocritic

linters-settings:
  misspell:
    locale: US
  revive:
    rules:
      - name: exported
        arguments:
          - disableStutteringCheck
  gocritic:
    enabled-tags:
      - diagnostic
      - style
    disabled-checks:
      - ifElseChain
      - unnamedResult

issues:
  exclude-use-default: false
  max-issues-per-linter: 50
  max-same-issues: 10

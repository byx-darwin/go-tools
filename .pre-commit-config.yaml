minimum_pre_commit_version: '3.7.0'
default_install_hook_types:
  - pre-commit
  - pre-push

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args:
          - --markdown-linebreak-ext=md
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: go-fmt
        name: gofmt + goimports
        entry: bash -c 'find . -name "*.go" -not -path "./.git/*" -not -path "*/vendor/*" | xargs gofmt -w && find . -name "*.go" -not -path "./.git/*" -not -path "*/vendor/*" | xargs goimports -w'
        language: system
        pass_filenames: false
        types:
          - go
        require_serial: true

      - id: go-vet
        name: go vet
        entry: bash -c 'go vet ./go-common/... ./go-auth/... ./go-middleware/... ./go-framework/...'
        language: system
        pass_filenames: false
        stages:
          - pre-push

      - id: go-test
        name: go test
        entry: bash -c 'go test ./go-common/... ./go-auth/... ./go-middleware/... ./go-framework/... -count=1'
        language: system
        pass_filenames: false
        stages:
          - pre-push

      - id: go-build
        name: go build
        entry: bash -c 'go build ./go-common/... ./go-auth/... ./go-middleware/... ./go-framework/...'
        language: system
        pass_filenames: false
        stages:
          - pre-push

      - id: go-lint
        name: golangci-lint
        entry: bash -c 'for m in go-common go-auth go-middleware go-framework; do echo "==> $m"; golangci-lint run --timeout=5m ./$m/... || exit 1; done'
        language: system
        pass_filenames: false
        stages:
          - pre-push
